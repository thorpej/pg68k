#
# OpenOCD script describing the JTAG chain configuration on the
# Phaethon 1.
#

source ../../jtag/tigard-jtag.cfg

adapter speed 500

# Device 1: MMU - ATF1508AS (TQFP-100)
jtag newtap atf1508as mmu -irlen 10 -expected-id 0x0150803f

# Device 2: I/O controller - ATF1508AS (TQFP-100)
jtag newtap atf1508as ioctl -irlen 10 -expected-id 0x0150803f

# Device 3: Memory interface logic - ATF1504AS (PLCC44)
jtag newtap atf1504as memctl -irlen 10 -expected-id 0x0150403f

init
